<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Elliot Wahl — journalist och kriminalreporter. Undersökande journalistik med precision och integritet.">
  <title>Elliot Wahl — Journalist</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* ══════════════════════════════════════════════
       DESIGN TOKENS
       ══════════════════════════════════════════════ */
    :root {
      --black: #000000;
      --white: #ffffff;
      --off-white: #f5f5f5;
      --grey-100: #e8e8e8;
      --grey-200: #d0d0d0;
      --grey-400: #888888;
      --grey-600: #555555;
      --grey-800: #222222;
      --grey-900: #111111;
      --f-serif: 'Instrument Serif', Georgia, serif;
      --f-sans: 'Space Grotesk', -apple-system, sans-serif;
      --f-mono: 'Space Mono', monospace;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ══════════════════════════════════════════════
       RESET
       ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--f-sans);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      cursor: none;
    }
    ::selection { background: var(--white); color: var(--black); }

    /* ══════════════════════════════════════════════
       CUSTOM CURSOR
       ══════════════════════════════════════════════ */
    #cursor {
      position: fixed; top: 0; left: 0; z-index: 9999;
      width: 12px; height: 12px;
      background: var(--white);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: width .3s var(--ease-out-expo), height .3s var(--ease-out-expo);
      mix-blend-mode: difference;
    }
    #cursor.expand { width: 60px; height: 60px; }

    /* ══════════════════════════════════════════════
       NOISE OVERLAY
       ══════════════════════════════════════════════ */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9998;
      pointer-events: none;
      opacity: .035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    /* ══════════════════════════════════════════════
       NAV
       ══════════════════════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 24px 48px;
      display: flex; align-items: center; justify-content: space-between;
      mix-blend-mode: difference;
    }
    .nav-logo {
      font-family: var(--f-mono);
      font-size: .8rem; font-weight: 700;
      color: var(--white); text-decoration: none;
      letter-spacing: .15em; text-transform: uppercase;
    }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a {
      font-family: var(--f-mono);
      font-size: .65rem; font-weight: 400;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--white); text-decoration: none;
      position: relative; padding-bottom: 2px;
    }
    .nav-links a::after {
      content: '';
      position: absolute; bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--white);
      transition: width .4s var(--ease-out-expo);
    }
    .nav-links a:hover::after { width: 100%; }

    /* ══════════════════════════════════════════════
       HERO
       ══════════════════════════════════════════════ */
    #hero {
      position: relative;
      height: 100svh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }
    .hero-left {
      display: flex; flex-direction: column;
      justify-content: flex-end;
      padding: 0 48px 80px;
      position: relative; z-index: 2;
    }
    .hero-right { position: relative; overflow: hidden; }
    .hero-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: grayscale(100%) contrast(1.15);
      transform: scale(1.05);
      transition: transform 8s ease;
    }
    .hero-img.loaded { transform: scale(1); }
    .hero-img-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to right, var(--black) 0%, transparent 40%);
    }
    .hero-eyebrow {
      font-family: var(--f-mono);
      font-size: .6rem; letter-spacing: .35em;
      color: var(--grey-400); text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp .8s var(--ease-out-expo) .4s forwards;
    }
    .hero-name {
      font-family: var(--f-serif);
      font-size: clamp(5rem, 12vw, 12rem);
      font-weight: 400; font-style: italic;
      line-height: .85; letter-spacing: -.04em;
      margin-bottom: 28px;
      overflow: hidden;
    }
    .hero-name span {
      display: block;
      transform: translateY(115%);
      animation: slideUp 1.2s var(--ease-out-expo) forwards;
    }
    .hero-name span:nth-child(2) { animation-delay: .15s; }
    .hero-sub {
      font-family: var(--f-mono);
      font-size: .65rem; letter-spacing: .3em;
      text-transform: uppercase; color: var(--grey-400);
      margin-bottom: 48px;
      opacity: 0; animation: fadeUp .8s var(--ease-out-expo) .7s forwards;
    }
    .hero-ctas {
      display: flex; gap: 16px;
      opacity: 0; animation: fadeUp .8s var(--ease-out-expo) .9s forwards;
    }
    .scroll-indicator {
      position: absolute; bottom: 48px; left: 48px; z-index: 2;
      display: flex; align-items: center; gap: 12px;
      opacity: 0; animation: fadeUp 1s var(--ease-out-expo) 1.5s forwards;
    }
    .scroll-line {
      width: 1px; height: 48px;
      background: linear-gradient(to bottom, var(--white), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    .scroll-text {
      font-family: var(--f-mono); font-size: .55rem;
      letter-spacing: .25em; text-transform: uppercase;
      color: var(--grey-400);
      writing-mode: vertical-rl;
    }

    /* ══════════════════════════════════════════════
       BUTTONS
       ══════════════════════════════════════════════ */
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 32px;
      font-family: var(--f-mono); font-size: .65rem;
      font-weight: 700; letter-spacing: .15em; text-transform: uppercase;
      text-decoration: none; transition: all .4s var(--ease-out-expo);
    }
    .btn-primary { background: var(--white); color: var(--black); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 20px 60px rgba(255,255,255,.15); }
    .btn-outline { background: transparent; color: var(--white); border: 1px solid var(--grey-600); }
    .btn-outline:hover { border-color: var(--white); transform: translateY(-2px); }

    /* ══════════════════════════════════════════════
       MARQUEE
       ══════════════════════════════════════════════ */
    .marquee-strip {
      padding: 20px 0;
      border-top: 1px solid var(--grey-800);
      border-bottom: 1px solid var(--grey-800);
      overflow: hidden;
    }
    .marquee-track {
      display: flex;
      animation: marquee 30s linear infinite;
      width: max-content;
    }
    .marquee-item {
      font-family: var(--f-serif);
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      font-style: italic;
      white-space: nowrap;
      padding: 0 48px;
      color: var(--grey-600);
    }
    .marquee-item .dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--white); border-radius: 50%;
      margin: 0 32px; vertical-align: middle;
    }

    /* ══════════════════════════════════════════════
       SECTION LAYOUT
       ══════════════════════════════════════════════ */
    section { position: relative; z-index: 1; }
    .section-padding { padding: 140px 48px; }
    .section-inner { max-width: 1400px; margin: 0 auto; }
    .section-label {
      font-family: var(--f-mono);
      font-size: .55rem; letter-spacing: .4em; text-transform: uppercase;
      color: var(--grey-400);
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 16px;
    }
    .section-label::before {
      content: ''; display: block;
      width: 40px; height: 1px; background: var(--grey-600);
    }
    .section-title {
      font-family: var(--f-serif);
      font-size: clamp(3rem, 7vw, 8rem);
      font-weight: 400; font-style: italic;
      line-height: .92; letter-spacing: -.03em;
      margin-bottom: 32px;
    }
    .divider-full { height: 1px; background: var(--grey-800); }

    /* ══════════════════════════════════════════════
       REVEAL ANIMATION
       ══════════════════════════════════════════════ */
    .rv {
      opacity: 0; transform: translateY(40px);
      transition: opacity .9s var(--ease-out-expo), transform .9s var(--ease-out-expo);
    }
    .rv.on { opacity: 1; transform: none; }
    .rv.d1 { transition-delay: .1s; }
    .rv.d2 { transition-delay: .2s; }
    .rv.d3 { transition-delay: .3s; }
    .rv.d4 { transition-delay: .4s; }
    .rv.d5 { transition-delay: .5s; }
    .rv.d6 { transition-delay: .6s; }

    /* ══════════════════════════════════════════════
       ABOUT
       ══════════════════════════════════════════════ */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 120px; align-items: start;
    }
    .about-text {
      font-family: var(--f-serif);
      font-size: clamp(1.15rem, 1.8vw, 1.5rem);
      font-weight: 400; line-height: 1.7;
      color: var(--grey-200); margin-bottom: 20px;
    }
    .about-text strong { color: var(--white); font-weight: 400; }
    .facts-list { display: flex; flex-direction: column; }
    .fact-item {
      padding: 28px 0;
      border-bottom: 1px solid var(--grey-800);
      display: grid; grid-template-columns: 140px 1fr; gap: 24px;
      align-items: baseline;
      transition: padding-left .4s var(--ease-out-expo);
    }
    .fact-item:first-child { border-top: 1px solid var(--grey-800); }
    .fact-item:hover { padding-left: 12px; }
    .fact-label {
      font-family: var(--f-mono);
      font-size: .6rem; letter-spacing: .2em;
      text-transform: uppercase; color: var(--grey-400);
    }
    .fact-value { font-family: var(--f-sans); font-size: .95rem; line-height: 1.5; }

    /* ══════════════════════════════════════════════
       PUBLISHED IN
       ══════════════════════════════════════════════ */
    .published-strip {
      border-top: 1px solid var(--grey-600);
      border-bottom: 1px solid var(--grey-600);
      display: flex; align-items: center;
      padding: 24px 0;
    }
    .published-label {
      font-family: var(--f-mono);
      font-size: .7rem; letter-spacing: .3em;
      text-transform: uppercase; color: var(--white);
      white-space: nowrap; flex-shrink: 0;
      padding: 0 40px;
      border-right: 1px solid var(--grey-600);
    }
    .published-marquee {
      overflow: hidden; flex: 1;
    }
    .published-track {
      display: flex; width: max-content;
      animation: marquee 50s linear infinite;
    }
    .published-track span {
      font-family: var(--f-serif);
      font-size: clamp(1.05rem, 1.8vw, 1.6rem);
      font-style: italic; color: var(--grey-200);
      white-space: nowrap; padding: 4px 0;
    }
    .published-track .sep {
      font-family: var(--f-serif); font-size: 1em;
      font-style: italic; color: var(--grey-600);
      padding: 0 20px; vertical-align: baseline;
    }

    /* ══════════════════════════════════════════════
       INVESTIGATIONS
       ══════════════════════════════════════════════ */
    .inv-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 2px; max-width: 1400px; margin: 0 auto;
    }
    .inv-card {
      padding: 48px;
      background: var(--grey-900);
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
      transition: background .4s;
    }
    .inv-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 3px;
      background: var(--white);
      transform: scaleX(0); transform-origin: left;
      transition: transform .6s var(--ease-out-expo);
    }
    .inv-card:hover { background: var(--grey-800); }
    .inv-card:hover::before { transform: scaleX(1); }
    .card-num {
      font-family: var(--f-serif);
      font-size: 4rem; font-style: italic;
      color: var(--grey-800); line-height: 1; margin-bottom: 24px;
      transition: color .4s;
    }
    .inv-card:hover .card-num { color: var(--white); }
    .card-title {
      font-family: var(--f-serif);
      font-size: clamp(1.4rem, 2.2vw, 2rem);
      font-weight: 400; font-style: italic;
      line-height: 1.15; margin-bottom: 16px;
    }
    .card-desc {
      font-size: .82rem; line-height: 1.7;
      color: var(--grey-400); flex-grow: 1;
    }
    .card-tag {
      margin-top: 28px;
      font-family: var(--f-mono); font-size: .55rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--grey-400);
      padding-top: 16px; border-top: 1px solid var(--grey-800);
    }

    /* ══════════════════════════════════════════════
       KRIM
       ══════════════════════════════════════════════ */
    .krim-section { margin-top: 80px; }
    .krim-list { margin-top: 32px; }
    .krim-item {
      display: flex; align-items: center; gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid var(--grey-800);
      text-decoration: none; color: var(--white);
      transition: padding-left .4s var(--ease-out-expo);
    }
    .krim-item:first-child { border-top: 1px solid var(--grey-800); }
    .krim-item:hover { padding-left: 16px; }
    .krim-arrow {
      font-family: var(--f-serif); font-size: 1.4rem; font-style: italic;
      color: var(--grey-600);
      transition: color .3s, transform .4s var(--ease-out-expo);
      flex-shrink: 0;
    }
    .krim-item:hover .krim-arrow { color: var(--white); transform: translateX(4px); }
    .krim-title {
      font-family: var(--f-sans); font-size: .88rem;
      font-weight: 500; line-height: 1.4; flex-grow: 1;
    }
    .krim-source {
      font-family: var(--f-mono); font-size: .55rem;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--grey-600); flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════
       PROJECTS
       ══════════════════════════════════════════════ */
    .project-feature {
      padding: 80px;
      border: 1px solid var(--grey-800);
      position: relative; overflow: hidden;
    }
    .project-feature::before {
      content: 'fupp';
      position: absolute; right: -40px; top: 50%;
      transform: translateY(-50%);
      font-family: var(--f-serif); font-size: 20rem;
      font-style: italic; font-weight: 400;
      color: var(--grey-900); line-height: 1;
      pointer-events: none; user-select: none;
    }
    .proj-badge {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 6px 16px;
      border: 1px solid var(--grey-600);
      font-family: var(--f-mono); font-size: .55rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--grey-400); margin-bottom: 32px;
    }
    .proj-badge::before {
      content: ''; width: 6px; height: 6px;
      background: var(--white); border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    .proj-title {
      font-family: var(--f-serif);
      font-size: clamp(3rem, 6vw, 6rem);
      font-weight: 400; font-style: italic;
      line-height: .95; margin-bottom: 20px; position: relative;
    }
    .proj-desc {
      font-family: var(--f-serif);
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      font-weight: 400; line-height: 1.7;
      color: var(--grey-400);
      max-width: 55ch; margin-bottom: 48px; position: relative;
    }
    .tools-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 2px; position: relative;
    }
    .tool-item {
      padding: 20px 24px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--grey-800);
      text-decoration: none; color: inherit; display: block;
      transition: background .3s, border-color .3s, transform .3s var(--ease-out-expo);
    }
    .tool-item:hover {
      background: rgba(255,255,255,.07);
      border-color: var(--white); transform: translateY(-3px);
    }
    .tool-name { font-family: var(--f-mono); font-size: .7rem; font-weight: 700; letter-spacing: .04em; }
    .tool-desc { font-size: .65rem; color: var(--grey-600); margin-top: 6px; line-height: 1.4; }

    /* ══════════════════════════════════════════════
       SKILLS
       ══════════════════════════════════════════════ */
    .section-white { background: var(--white); color: var(--black); }
    .section-white .section-label { color: var(--grey-600); }
    .section-white .section-label::before { background: var(--grey-400); }
    .skills-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 48px; }
    .skill-pill {
      padding: 12px 28px;
      font-family: var(--f-mono); font-size: .65rem;
      font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      transition: all .4s var(--ease-out-expo);
    }
    .skill-pill.primary { background: var(--black); color: var(--white); }
    .skill-pill.primary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,.25); }
    .skill-pill.secondary { background: transparent; color: var(--grey-600); border: 1px solid var(--grey-200); }
    .skill-pill.secondary:hover { border-color: var(--black); color: var(--black); transform: translateY(-3px); }

    /* ══════════════════════════════════════════════
       CONTACT
       ══════════════════════════════════════════════ */
    .contact-block { text-align: center; }
    .contact-title {
      font-family: var(--f-serif);
      font-size: clamp(3.5rem, 10vw, 12rem);
      font-weight: 400; font-style: italic;
      line-height: .88; letter-spacing: -.03em; margin-bottom: 48px;
    }
    .contact-sub {
      font-family: var(--f-mono); font-size: .65rem;
      letter-spacing: .25em; text-transform: uppercase;
      color: var(--grey-400); margin-bottom: 56px;
    }
    .contact-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; }
    .c-link {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 28px; text-decoration: none;
      font-family: var(--f-mono); font-size: .65rem;
      font-weight: 400; letter-spacing: .1em;
      transition: all .4s var(--ease-out-expo);
    }
    .c-link svg { width: 14px; height: 14px; opacity: .6; flex-shrink: 0; }
    .c-link.primary-link { background: var(--white); color: var(--black); }
    .c-link.primary-link svg { opacity: .8; }
    .c-link.primary-link:hover { transform: translateY(-2px); box-shadow: 0 20px 60px rgba(255,255,255,.12); }
    .c-link.ghost-link { background: transparent; color: var(--white); border: 1px solid var(--grey-600); }
    .c-link.ghost-link:hover { border-color: var(--white); transform: translateY(-2px); }

    /* ══════════════════════════════════════════════
       FOOTER
       ══════════════════════════════════════════════ */
    footer {
      padding: 28px 48px;
      border-top: 1px solid var(--grey-800);
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 1;
    }
    .f-name { font-family: var(--f-mono); font-size: .7rem; font-weight: 700; letter-spacing: .1em; }
    .f-copy { font-family: var(--f-mono); font-size: .55rem; letter-spacing: .15em; color: var(--grey-600); }

    /* ══════════════════════════════════════════════
       KEYFRAMES
       ══════════════════════════════════════════════ */
    @keyframes slideUp {
      from { transform: translateY(115%); }
      to   { transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: .4; }
      50%       { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .3; transform: scale(.7); }
    }

    /* ══════════════════════════════════════════════
       RESPONSIVE
       ══════════════════════════════════════════════ */
    @media (max-width: 960px) {
      nav { padding: 18px 24px; }
      .nav-links { display: none; }

      /* Hero: stapelad — bild överst, text nedanför */
      #hero {
        display: flex; flex-direction: column;
        height: auto; min-height: 100svh;
      }
      .hero-right {
        position: relative; order: -1;
        width: 100%; height: 46svh;
        flex-shrink: 0; opacity: 1;
      }
      .hero-img { object-position: center 18%; }
      .hero-img-overlay {
        background: linear-gradient(to bottom, transparent 60%, var(--black) 100%);
      }
      .hero-left {
        flex: 1;
        padding: 20px 24px 48px;
        justify-content: center;
        position: relative; z-index: 2;
      }
      .hero-name { font-size: clamp(3rem, 16vw, 4.5rem); margin-bottom: 16px; }
      .hero-sub { margin-bottom: 32px; }
      .hero-eyebrow { display: none; }
      .scroll-indicator { display: none; }

      .section-padding { padding: 80px 24px; }
      .about-grid { grid-template-columns: 1fr; gap: 48px; }
      .inv-grid { grid-template-columns: 1fr; }
      .tools-grid { grid-template-columns: repeat(2, 1fr); }
      .project-feature { padding: 40px 28px; }
      .fact-item { grid-template-columns: 1fr; gap: 6px; }
      .krim-source { display: none; }
      .contact-links { flex-direction: column; align-items: center; }
      .published-label { padding: 0 24px; }
      footer { padding: 22px 24px; flex-direction: column; gap: 8px; text-align: center; }
    }
    @media (max-width: 540px) {
      .tools-grid { grid-template-columns: 1fr; }
      .hero-ctas { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div id="cursor"></div>

  <!-- Byggs av render.js nedan -->
  <nav></nav>
  <section id="hero"></section>
  <div class="marquee-strip" aria-hidden="true"></div>
  <section id="about"><div class="section-padding"><div class="section-inner"></div></div></section>
  <div class="published-strip rv"></div>
  <div class="divider-full"></div>
  <section id="investigations"></section>
  <div class="divider-full"></div>
  <section id="projects"><div class="section-padding"><div class="section-inner"></div></div></section>
  <div class="divider-full"></div>
  <section id="skills" class="section-white"><div class="section-padding"><div class="section-inner"></div></div></section>
  <section id="contact"><div class="section-padding" style="padding-bottom:160px;"><div class="section-inner"></div></div></section>
  <footer></footer>

  <!-- SVG-ikoner (återanvänds av JS) -->
  <svg style="display:none">
    <symbol id="icon-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </symbol>
    <symbol id="icon-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </symbol>
    <symbol id="icon-bluesky" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.561 1.266.902 1.565.139 1.908 0 3.08 0 3.768c0 .69.378 5.65.624 6.479.815 2.736 3.713 3.66 6.383 3.364.136-.02.275-.039.415-.056-.138.022-.276.04-.415.056-3.912.58-7.387 2.005-2.83 7.078 5.013 5.19 6.87-1.113 7.823-4.308.953 3.195 2.05 9.271 7.733 4.308 4.267-4.308 1.172-6.498-2.74-7.078a8.741 8.741 0 01-.415-.056c.14.017.279.036.415.056 2.67.297 5.568-.628 6.383-3.364.246-.828.624-5.79.624-6.478 0-.69-.139-1.861-.902-2.204-.659-.298-1.664-.62-4.3 1.24C16.046 4.748 13.087 8.687 12 10.8z"/>
    </symbol>
    <symbol id="icon-linkedin" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
    </symbol>
    <symbol id="icon-photo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </symbol>
  </svg>

  <script src="content.js"></script>
  <script>
  /* ═══════════════════════════════════════════════════════════════
     RENDER — bygger hela sidan från SITE-objektet i content.js
     ═══════════════════════════════════════════════════════════════ */

  function icon(name) {
    return `<svg width="14" height="14"><use href="#icon-${name}"/></svg>`;
  }

  /* ── NAV ──────────────────────────────────────────────────────── */
  document.querySelector('nav').innerHTML = `
    <a href="#" class="nav-logo">${SITE.name}</a>
    <ul class="nav-links">
      <li><a href="#about">Om mig</a></li>
      <li><a href="#investigations">Arbeten</a></li>
      <li><a href="#projects">Projekt</a></li>
      <li><a href="#contact">Kontakt</a></li>
    </ul>`;

  /* ── HERO ─────────────────────────────────────────────────────── */
  document.getElementById('hero').innerHTML = `
    <div class="hero-left">
      <h1 class="hero-name" aria-label="${SITE.name}">
        ${SITE.name.split(' ').map(w => `<span>${w}</span>`).join('')}
      </h1>
      <p class="hero-sub">${SITE.roles.join(' &middot; ')}</p>
      <div class="hero-ctas">
        <a href="#contact" class="btn btn-primary">Kontakta mig</a>
        <a href="#investigations" class="btn btn-outline">Se mitt arbete</a>
      </div>
    </div>
    <div class="hero-right">
      <img src="profil_high.jpg" alt="${SITE.name}" class="hero-img" loading="eager">
      <div class="hero-img-overlay"></div>
    </div>
`;

  /* ── MARQUEE ──────────────────────────────────────────────────── */
  const marqueeText = SITE.skills.primary
    .concat(SITE.skills.secondary)
    .join(' <span class="dot"></span> ');
  document.querySelector('.marquee-strip').innerHTML = `
    <div class="marquee-track">
      <span class="marquee-item">${marqueeText}</span>
      <span class="marquee-item">${marqueeText}</span>
    </div>`;

  /* ── ABOUT ────────────────────────────────────────────────────── */
  document.querySelector('#about .section-inner').innerHTML = `
    <div class="about-grid">
      <div>
        <div class="section-label rv">Om mig</div>
        <h2 class="section-title rv d1">${SITE.about.title.join('<br>')}</h2>
        ${SITE.about.paragraphs.map((p, i) => `<p class="about-text rv d${i + 2}">${p}</p>`).join('')}
      </div>
      <div class="facts-list rv d2">
        ${SITE.about.facts.map(f => `
          <div class="fact-item">
            <div class="fact-label">${f.label}</div>
            <div class="fact-value">${f.value}</div>
          </div>`).join('')}
      </div>
    </div>`;

  /* ── PUBLISHED IN ─────────────────────────────────────────────── */
  const logosHtml = SITE.publishedIn
    .map(m => `<span>${m}</span><span class="sep">/</span>`)
    .join('');
  document.querySelector('.published-strip').innerHTML = `
    <div class="published-label">Publicerad i</div>
    <div class="published-marquee">
      <div class="published-track">
        ${logosHtml}${logosHtml}
      </div>
    </div>`;

  /* ── INVESTIGATIONS ───────────────────────────────────────────── */
  const delays = ['', 'd1', 'd2', 'd3'];
  document.getElementById('investigations').innerHTML = `
    <div class="section-padding">
      <div class="section-inner">
        <div class="section-label rv">Granskningar</div>
        <h2 class="section-title rv d1">Uppmärksammade<br><em>granskningar</em></h2>
      </div>
    </div>
    <div class="inv-grid">
      ${SITE.investigations.map((a, i) => `
        <a href="${a.url}" target="_blank" rel="noopener" class="inv-card rv ${delays[i]}">
          <span class="card-num">0${i + 1}</span>
          <h3 class="card-title">${a.title}</h3>
          <p class="card-desc">${a.desc}</p>
          <span class="card-tag">${a.source}</span>
        </a>`).join('')}
    </div>
    <div class="section-padding krim-section">
      <div class="section-inner">
        <div class="section-label rv">Kriminaljournalistik</div>
        <div class="krim-list">
          ${SITE.krim.map((k, i) => `
            <a href="${k.url}" target="_blank" rel="noopener" class="krim-item rv ${delays[i] || ''}">
              <span class="krim-arrow">&rarr;</span>
              <span class="krim-title">${k.title}</span>
              <span class="krim-source">${k.source}</span>
            </a>`).join('')}
        </div>
      </div>
    </div>`;

  /* ── PROJECTS ─────────────────────────────────────────────────── */
  const p = SITE.project;
  document.querySelector('#projects .section-inner').innerHTML = `
    <div class="section-label rv">Projekt</div>
    <h2 class="section-title rv d1">Verktyg och<br>projekt</h2>
    <div class="project-feature rv d2">
      <div class="proj-badge">${p.badge}</div>
      <h3 class="proj-title">${p.title}</h3>
      <p class="proj-desc">${p.desc}</p>
      <div class="tools-grid">
        ${p.tools.map(t => `
          <a href="${t.url}" target="_blank" rel="noopener" class="tool-item">
            <div class="tool-name">${t.name}</div>
            <div class="tool-desc">${t.desc}</div>
          </a>`).join('')}
      </div>
    </div>`;

  /* ── SKILLS ───────────────────────────────────────────────────── */
  const primaryPills = SITE.skills.primary
    .map((s, i) => `<span class="skill-pill primary rv d${i}">${s}</span>`).join('');
  const secondaryPills = SITE.skills.secondary
    .map((s, i) => `<span class="skill-pill secondary rv d${i}">${s}</span>`).join('');
  document.querySelector('#skills .section-inner').innerHTML = `
    <div class="section-label rv">Kompetenser</div>
    <h2 class="section-title rv d1">Vad jag<br>behärskar</h2>
    <div class="skills-grid">${primaryPills}${secondaryPills}</div>`;

  /* ── CONTACT ──────────────────────────────────────────────────── */
  const c = SITE.contact;
  const linkHTML = c.links.map(l => `
    <a href="${l.url}"${l.primary ? '' : ' target="_blank" rel="noopener"'} class="c-link ${l.primary ? 'primary-link' : 'ghost-link'}">
      <svg width="14" height="14"><use href="#icon-${l.icon}"/></svg>
      ${l.label}
    </a>`).join('');
  document.querySelector('#contact .section-inner').innerHTML = `
    <div class="contact-block rv">
      <h2 class="contact-title">Låt oss<br>prata</h2>
      <p class="contact-sub">${c.intro}</p>
      <div class="contact-links">${linkHTML}</div>
    </div>`;

  /* ── FOOTER ───────────────────────────────────────────────────── */
  document.querySelector('footer').innerHTML = `
    <span class="f-name">${SITE.name}</span>
    <span class="f-copy">&copy; ${new Date().getFullYear()} &middot; ${SITE.roles.join(' &amp; ')}</span>`;

  /* ═══════════════════════════════════════════════════════════════
     INTERAKTIVITET
     ═══════════════════════════════════════════════════════════════ */

  /* ── Custom cursor ────────────────────────────────────────────── */
  const cursor = document.getElementById('cursor');
  let cx = 0, cy = 0, tx = 0, ty = 0;
  document.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });
  (function loop() {
    cx += (tx - cx) * .15; cy += (ty - cy) * .15;
    cursor.style.left = cx + 'px'; cursor.style.top = cy + 'px';
    requestAnimationFrame(loop);
  })();
  document.addEventListener('mouseover', e => {
    if (e.target.closest('a, button, .inv-card, .fact-item, .tool-item, .skill-pill, .krim-item'))
      cursor.classList.add('expand');
    else cursor.classList.remove('expand');
  });

  /* ── Hero image zoom ──────────────────────────────────────────── */
  window.addEventListener('load', () => document.querySelector('.hero-img')?.classList.add('loaded'));

  /* ── Scroll reveal ────────────────────────────────────────────── */
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('on'); io.unobserve(e.target); } });
  }, { threshold: .08, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.rv').forEach(el => io.observe(el));

  /* ── Hero parallax ────────────────────────────────────────────── */
  const heroImg = document.querySelector('.hero-img');
  const heroSection = document.getElementById('hero');
  window.addEventListener('scroll', () => {
    if (!heroImg || heroSection.getBoundingClientRect().bottom < 0) return;
    heroImg.style.transform = `scale(${1.05 - scrollY * 0.00008}) translateY(${scrollY * 0.15}px)`;
  }, { passive: true });

  /* ── Magnetic buttons ─────────────────────────────────────────── */
  document.querySelectorAll('.btn, .c-link').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      const r = btn.getBoundingClientRect();
      btn.style.transform = `translate(${(e.clientX - r.left - r.width/2) * .15}px, ${(e.clientY - r.top - r.height/2) * .15}px)`;
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.transition = 'transform .5s cubic-bezier(.16,1,.3,1)';
      btn.style.transform = '';
      setTimeout(() => btn.style.transition = '', 500);
    });
  });

  /* ── Card 3-D tilt ────────────────────────────────────────────── */
  document.querySelectorAll('.inv-card').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      card.style.transition = 'transform .08s ease, background .4s';
      card.style.transform = `perspective(800px) rotateX(${((e.clientY-r.top)/r.height-.5)*-4}deg) rotateY(${((e.clientX-r.left)/r.width-.5)*4}deg)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transition = 'transform .6s cubic-bezier(.16,1,.3,1), background .4s';
      card.style.transform = '';
    });
  });

  /* ── Touch: återställ cursor ──────────────────────────────────── */
  if ('ontouchstart' in window) {
    document.body.style.cursor = 'auto';
    cursor.style.display = 'none';
  }
  </script>
</body>
</html>
