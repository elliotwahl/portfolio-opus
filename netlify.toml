[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "https://www.elliotwahl.se/*"
  to = "https://elliotwahl.se/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/stats/script.js"
  to = "https://cloud.umami.is/script.js"
  status = 200
  force = true

[[redirects]]
  from = "/stats/api/send"
  to = "https://cloud.umami.is/api/send"
  status = 200
  force = true
